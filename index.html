<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ForMe</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        :root {
            --bg: #0b1220;
            --card: #111827;
            --grid: #1f2937;
            --text: #e5e7eb;
            --muted: #9ca3af;
            --accent-watch: #a855f7;
            --accent-stats: #3b82f6;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: radial-gradient(ellipse 120% 80% at 50% -20%, rgba(168, 85, 247, 0.08), transparent),
                var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        h1 {
            margin: 0 0 8px;
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        .sub {
            margin: 0 0 28px;
            font-size: 14px;
            color: var(--muted);
        }

        .cards {
            display: grid;
            grid-template-columns: 1fr;
            gap: 14px;
            width: 100%;
            max-width: 360px;
        }

        @media (min-width: 520px) {
            .cards {
                grid-template-columns: 1fr 1fr;
                max-width: 520px;
            }
        }

        a.tile {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 6px;
            padding: 20px 18px;
            border-radius: 12px;
            border: 1px solid var(--grid);
            background: var(--card);
            color: var(--text);
            text-decoration: none;
            transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
        }

        a.tile:hover {
            transform: translateY(-2px);
            border-color: #374151;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.35);
        }

        a.tile:focus-visible {
            outline: 2px solid var(--accent-watch);
            outline-offset: 2px;
        }

        a.tile.stats:focus-visible {
            outline-color: var(--accent-stats);
        }

        .tile-title {
            font-size: 1.05rem;
            font-weight: 600;
        }

        .tile-desc {
            font-size: 13px;
            color: var(--muted);
            line-height: 1.4;
        }

        a.tile.watch .tile-title {
            color: var(--accent-watch);
        }

        a.tile.stats .tile-title {
            color: var(--accent-stats);
        }
    </style>
</head>

<body>
    <h1>ForMe</h1>
    <p class="sub">选择一个入口</p>
    <nav class="cards" aria-label="主导航">
        <a class="tile watch" href="追番.html">
            <span class="tile-title">追番记录</span>
            <span class="tile-desc">番剧进度与清单</span>
        </a>
        <a class="tile stats" href="统计.html">
            <span class="tile-title">工时统计</span>
            <span class="tile-desc">每日工时与 Excel 导入导出</span>
        </a>
    </nav>
</body>

</html>
