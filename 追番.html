<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>追番记录</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        :root {
            --bg: #0b1220;
            --card: #111827;
            --grid: #1f2937;
            --text: #e5e7eb;
            --muted: #9ca3af;
            --accent: #a855f7;
            --watching: #22c55e;
            --planned: #38bdf8;
            --done: #64748b;
            --hold: #f59e0b;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(ellipse 120% 80% at 50% -20%, rgba(168, 85, 247, 0.12), transparent),
                var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
            line-height: 1.45;
            -webkit-font-smoothing: antialiased;
        }

        header {
            padding: 0;
            border-bottom: 1px solid var(--grid);
            position: sticky;
            top: 0;
            background: rgba(11, 18, 32, 0.92);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .header-row {
            padding: 14px 20px;
        }

        .header-inner {
            max-width: 960px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        h1 {
            margin: 0;
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        .toolbar {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }

        button,
        .btn-file {
            background: var(--grid);
            border: 1px solid #374151;
            color: var(--text);
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
        }

        button:hover,
        .btn-file:hover {
            background: #374151;
            border-color: #4b5563;
        }

        button.primary {
            background: var(--accent);
            border-color: #9333ea;
            color: #fff;
        }

        button.primary:hover {
            background: #9333ea;
        }

        button.danger {
            border-color: #7f1d1d;
            color: #fca5a5;
        }

        button.danger:hover {
            background: rgba(127, 29, 29, 0.35);
        }

        .btn-file input {
            display: none;
        }

        main {
            max-width: 960px;
            margin: 0 auto;
            padding: 20px;
        }

        .stats {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 18px;
        }

        .stat-pill {
            font-size: 12px;
            padding: 6px 12px;
            border-radius: 999px;
            background: var(--card);
            border: 1px solid var(--grid);
            color: var(--muted);
        }

        .stat-pill strong {
            color: var(--text);
            margin-left: 4px;
        }

        .filters {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 16px;
            align-items: center;
        }

        .filters label {
            font-size: 12px;
            color: var(--muted);
        }

        select {
            background: var(--card);
            border: 1px solid var(--grid);
            color: var(--text);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
        }

        .search-wrap {
            flex: 1;
            min-width: 160px;
            max-width: 280px;
        }

        .search-wrap input {
            width: 100%;
            background: var(--card);
            border: 1px solid var(--grid);
            color: var(--text);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 13px;
        }

        .search-wrap input::placeholder {
            color: var(--muted);
        }

        .panel {
            background: var(--card);
            border: 1px solid var(--grid);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .panel h2 {
            margin: 0 0 14px;
            font-size: 14px;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .form-grid {
            display: grid;
            gap: 12px;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            align-items: end;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .field.span-2 {
            grid-column: span 2;
        }

        @media (max-width: 520px) {
            .field.span-2 {
                grid-column: span 1;
            }
        }

        .field label {
            font-size: 12px;
            color: var(--muted);
        }

        .field input {
            background: var(--bg);
            border: 1px solid var(--grid);
            color: var(--text);
            padding: 8px 10px;
            border-radius: 8px;
            font-size: 13px;
        }

        .form-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 14px;
        }

        .list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .card {
            background: var(--bg);
            border: 1px solid var(--grid);
            border-radius: 10px;
            padding: 14px 16px;
            display: grid;
            gap: 10px;
            grid-template-columns: 1fr auto;
            align-items: start;
        }

        @media (max-width: 560px) {
            .card {
                grid-template-columns: 1fr;
            }
        }

        .card-main h3 {
            margin: 0 0 6px;
            font-size: 1rem;
            font-weight: 600;
        }

        .meta {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            font-size: 13px;
            color: var(--muted);
        }

        .badge {
            display: inline-flex;
            align-items: center;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge.planned {
            background: rgba(56, 189, 248, 0.15);
            color: #7dd3fc;
        }

        .badge.watching {
            background: rgba(34, 197, 94, 0.15);
            color: #86efac;
        }

        .badge.done {
            background: rgba(100, 116, 139, 0.25);
            color: #cbd5e1;
        }

        .badge.hold {
            background: rgba(245, 158, 11, 0.15);
            color: #fcd34d;
        }

        .progress-line {
            margin-top: 8px;
            font-size: 13px;
            color: var(--text);
        }

        .progress-line .ep {
            color: var(--accent);
            font-weight: 600;
        }

        .link-row {
            margin-top: 6px;
        }

        .link-row a {
            color: var(--accent);
            font-size: 13px;
            text-decoration: none;
        }

        .link-row a:hover {
            text-decoration: underline;
        }

        .card-actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .card-actions button {
            padding: 6px 10px;
            font-size: 12px;
        }

        .empty {
            text-align: center;
            padding: 40px 20px;
            color: var(--muted);
            font-size: 14px;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--card);
            border: 1px solid var(--grid);
            padding: 10px 18px;
            border-radius: 10px;
            font-size: 13px;
            opacity: 0;
            transition: transform 0.25s, opacity 0.25s;
            z-index: 100;
            pointer-events: none;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
    </style>
</head>

<body>
    <header>
        <div class="header-row">
            <div class="header-inner">
                <h1>追番记录</h1>
                <div class="toolbar">
                    <button type="button" id="btn-export">导出 JSON</button>
                    <button type="button" id="btn-import">导入 JSON</button>
                    <label class="btn-file" hidden>
                        <input type="file" id="import-file" accept=".json,application/json">
                    </label>
                    <button type="button" class="danger" id="btn-clear">清空全部</button>
                </div>
            </div>
        </div>
    </header>

    <main>
        <div class="stats" id="stats"></div>

        <div class="filters">
            <label for="filter-status">状态</label>
            <select id="filter-status">
                <option value="">全部</option>
                <option value="planned">想看</option>
                <option value="watching">追番中</option>
                <option value="done">已看完</option>
                <option value="hold">搁置</option>
            </select>
            <div class="search-wrap">
                <input type="search" id="search" placeholder="搜索标题…" autocomplete="off">
            </div>
        </div>

        <section class="panel">
            <h2 id="form-title">添加条目</h2>
            <form id="form">
                <div class="form-grid">
                    <div class="field span-2">
                        <label for="title">标题</label>
                        <input id="title" name="title" required placeholder="作品名称" maxlength="200">
                    </div>
                    <div class="field">
                        <label for="status">状态</label>
                        <select id="status" name="status">
                            <option value="planned">想看</option>
                            <option value="watching" selected>追番中</option>
                            <option value="done">已看完</option>
                            <option value="hold">搁置</option>
                        </select>
                    </div>
                    <div class="field">
                        <label for="currentEp">当前看到</label>
                        <input id="currentEp" name="currentEp" type="number" min="0" step="1" placeholder="0">
                    </div>
                    <div class="field">
                        <label for="totalEp">总集数（可选）</label>
                        <input id="totalEp" name="totalEp" type="number" min="0" step="1" placeholder="留空表示未知">
                    </div>
                    <div class="field span-2">
                        <label for="url">链接（可选）</label>
                        <input id="url" name="url" type="url" placeholder="Bangumi / B站 / 任意网址">
                    </div>
                </div>
                <div class="form-actions">
                    <button type="submit" class="primary" id="btn-submit">保存</button>
                    <button type="button" id="btn-cancel-edit" hidden>取消编辑</button>
                </div>
            </form>
        </section>

        <section class="panel" style="padding-top: 12px;">
            <h2>列表</h2>
            <div class="list" id="list"></div>
        </section>
    </main>

    <div class="toast" id="toast" role="status"></div>

    <script src="api-config.js"></script>
    <script>
        (function () {
            const STORAGE_KEY = 'forme-anime-tracker-v1';
            const EXPORT_FILENAME = '追番数据.json';
            const API_BASE = String(window.FORME_API_BASE || '').trim().replace(/\/$/, '');
            const API_KEY = String(window.FORME_API_KEY || '').trim();

            function apiUrl(p) {
                return API_BASE + p;
            }

            function apiHeaders(json) {
                const h = {};
                if (json) h['Content-Type'] = 'application/json';
                if (API_KEY) h['X-API-Key'] = API_KEY;
                return h;
            }

            let saveTimer = null;

            const STATUS_LABEL = {
                planned: '想看',
                watching: '追番中',
                done: '已看完',
                hold: '搁置'
            };

            const STATUS_CLASS = {
                planned: 'planned',
                watching: 'watching',
                done: 'done',
                hold: 'hold'
            };

            let entries = [];
            let editingId = null;

            const el = {
                form: document.getElementById('form'),
                formTitle: document.getElementById('form-title'),
                title: document.getElementById('title'),
                status: document.getElementById('status'),
                currentEp: document.getElementById('currentEp'),
                totalEp: document.getElementById('totalEp'),
                url: document.getElementById('url'),
                btnSubmit: document.getElementById('btn-submit'),
                btnCancelEdit: document.getElementById('btn-cancel-edit'),
                list: document.getElementById('list'),
                stats: document.getElementById('stats'),
                filterStatus: document.getElementById('filter-status'),
                search: document.getElementById('search'),
                toast: document.getElementById('toast'),
                btnExport: document.getElementById('btn-export'),
                btnImport: document.getElementById('btn-import'),
                importFile: document.getElementById('import-file'),
                btnClear: document.getElementById('btn-clear')
            };

            function loadLocalOnly() {
                try {
                    const raw = localStorage.getItem(STORAGE_KEY);
                    if (!raw) {
                        entries = [];
                        return;
                    }
                    const data = JSON.parse(raw);
                    entries = Array.isArray(data) ? data.map(stripLegacyFields) : [];
                } catch {
                    entries = [];
                }
            }

            async function load() {
                if (API_BASE) {
                    try {
                        const r = await fetch(apiUrl('/api/watch'), { headers: apiHeaders(false) });
                        if (!r.ok) throw new Error(r.status + ' ' + r.statusText);
                        const data = await r.json();
                        entries = Array.isArray(data) ? data.map(stripLegacyFields) : [];
                        localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
                    } catch (e) {
                        console.error(e);
                        loadLocalOnly();
                        toast('服务器不可用，已使用本地缓存');
                    }
                    return;
                }
                loadLocalOnly();
            }

            async function flushSave() {
                entries = entries.map(stripLegacyFields);
                try {
                    const r = await fetch(apiUrl('/api/watch'), {
                        method: 'PUT',
                        headers: apiHeaders(true),
                        body: JSON.stringify(entries),
                    });
                    if (!r.ok) throw new Error(await r.text());
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
                } catch (e) {
                    console.error(e);
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
                    toast('保存到服务器失败，已暂存本地');
                }
            }

            function save() {
                entries = entries.map(stripLegacyFields);
                if (!API_BASE) {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
                    return;
                }
                clearTimeout(saveTimer);
                saveTimer = setTimeout(() => {
                    flushSave();
                }, 400);
            }

            function uid() {
                return crypto.randomUUID ? crypto.randomUUID() : String(Date.now()) + Math.random().toString(16).slice(2);
            }

            function stripLegacyFields(e) {
                if (!e || typeof e !== 'object') return e;
                const { season, notes, ...rest } = e;
                return rest;
            }

            function mergeImported(normalized) {
                if (!confirm(`将导入 ${normalized.length} 条记录，会与现有数据合并，是否继续？`)) return;
                const ids = new Set(entries.map((e) => e.id));
                normalized.forEach((n) => {
                    if (ids.has(n.id)) n.id = uid();
                    entries.push(n);
                    ids.add(n.id);
                });
                save();
                renderList();
                toast('导入完成');
            }

            function processImportText(text) {
                const data = JSON.parse(text);
                if (!Array.isArray(data)) throw new Error('格式应为数组');
                const normalized = data.map((x) =>
                    stripLegacyFields({
                        id: x.id && typeof x.id === 'string' ? x.id : uid(),
                        title: String(x.title || '').trim() || '未命名',
                        status: ['planned', 'watching', 'done', 'hold'].includes(x.status) ? x.status : 'watching',
                        currentEp: typeof x.currentEp === 'number' && x.currentEp >= 0 ? x.currentEp : 0,
                        totalEp: typeof x.totalEp === 'number' && x.totalEp >= 0 ? x.totalEp : null,
                        url: String(x.url || '').trim(),
                        updatedAt: typeof x.updatedAt === 'number' ? x.updatedAt : Date.now()
                    })
                );
                mergeImported(normalized);
            }

            function parseOptionalInt(value) {
                if (value === '' || value == null) return null;
                const n = parseInt(value, 10);
                return Number.isFinite(n) && n >= 0 ? n : null;
            }

            function toast(msg) {
                el.toast.textContent = msg;
                el.toast.classList.add('show');
                clearTimeout(toast._t);
                toast._t = setTimeout(() => el.toast.classList.remove('show'), 2200);
            }

            function escapeHtml(s) {
                const div = document.createElement('div');
                div.textContent = s;
                return div.innerHTML;
            }

            function renderStats(filteredLen) {
                const c = { planned: 0, watching: 0, done: 0, hold: 0 };
                entries.forEach((e) => {
                    if (c[e.status] !== undefined) c[e.status]++;
                });
                el.stats.innerHTML = `
                    <span class="stat-pill">共 <strong>${entries.length}</strong> 部</span>
                    <span class="stat-pill">想看 <strong>${c.planned}</strong></span>
                    <span class="stat-pill">追番中 <strong>${c.watching}</strong></span>
                    <span class="stat-pill">已看完 <strong>${c.done}</strong></span>
                    <span class="stat-pill">搁置 <strong>${c.hold}</strong></span>
                    ${el.filterStatus.value || el.search.value.trim() ? `<span class="stat-pill">当前显示 <strong>${filteredLen}</strong> 部</span>` : ''}
                `;
            }

            function getFiltered() {
                const st = el.filterStatus.value;
                const q = el.search.value.trim().toLowerCase();
                return entries.filter((e) => {
                    if (st && e.status !== st) return false;
                    if (!q) return true;
                    const hay = (e.title || '').toLowerCase();
                    return hay.includes(q);
                });
            }

            function sortEntries(arr) {
                const order = { watching: 0, planned: 1, hold: 2, done: 3 };
                return [...arr].sort((a, b) => {
                    const os = (order[a.status] ?? 9) - (order[b.status] ?? 9);
                    if (os !== 0) return os;
                    const ta = a.updatedAt || 0;
                    const tb = b.updatedAt || 0;
                    return tb - ta;
                });
            }

            function renderList() {
                const filtered = sortEntries(getFiltered());
                renderStats(filtered.length);

                if (filtered.length === 0) {
                    el.list.innerHTML = '<p class="empty">暂无条目，先在上方添加一部作品吧。</p>';
                    return;
                }

                el.list.innerHTML = filtered.map((e) => {
                    const badgeClass = STATUS_CLASS[e.status] || 'planned';
                    const epCur = e.currentEp != null ? e.currentEp : 0;
                    const epTotal = e.totalEp != null ? e.totalEp : null;
                    let epText = `<span class="ep">第 ${epCur} 话</span>`;
                    if (epTotal != null) epText += ` / 共 ${epTotal} 话`;
                    let linkHtml = '';
                    if (e.url) {
                        const safe = escapeHtml(e.url);
                        linkHtml = `<div class="link-row"><a href="${safe}" target="_blank" rel="noopener noreferrer">打开链接</a></div>`;
                    }
                    return `
                        <article class="card" data-id="${escapeHtml(e.id)}">
                            <div class="card-main">
                                <h3>${escapeHtml(e.title)}</h3>
                                <div class="meta">
                                    <span class="badge ${badgeClass}">${STATUS_LABEL[e.status] || e.status}</span>
                                </div>
                                <div class="progress-line">${epText}</div>
                                ${linkHtml}
                            </div>
                            <div class="card-actions">
                                <button type="button" data-action="ep-plus">+1 话</button>
                                <button type="button" data-action="edit">编辑</button>
                                <button type="button" class="danger" data-action="delete">删除</button>
                            </div>
                        </article>
                    `;
                }).join('');
            }

            function resetForm() {
                editingId = null;
                el.formTitle.textContent = '添加条目';
                el.btnSubmit.textContent = '保存';
                el.btnCancelEdit.hidden = true;
                el.form.reset();
                el.status.value = 'watching';
            }

            el.form.addEventListener('submit', (ev) => {
                ev.preventDefault();
                const title = el.title.value.trim();
                if (!title) {
                    toast('请填写标题');
                    return;
                }
                const row = {
                    title,
                    status: el.status.value,
                    currentEp: parseOptionalInt(el.currentEp.value) ?? 0,
                    totalEp: parseOptionalInt(el.totalEp.value),
                    url: el.url.value.trim() || '',
                    updatedAt: Date.now()
                };

                if (editingId) {
                    const i = entries.findIndex((x) => x.id === editingId);
                    if (i >= 0) {
                        entries[i] = { ...entries[i], ...row };
                        toast('已更新');
                    }
                } else {
                    entries.push({ id: uid(), ...row });
                    toast('已添加');
                }
                save();
                resetForm();
                renderList();
            });

            el.btnCancelEdit.addEventListener('click', resetForm);

            el.list.addEventListener('click', (ev) => {
                const btn = ev.target.closest('button[data-action]');
                if (!btn) return;
                const card = btn.closest('.card');
                const id = card?.dataset?.id;
                if (!id) return;
                const action = btn.dataset.action;

                if (action === 'delete') {
                    if (!confirm('确定删除这条记录？')) return;
                    entries = entries.filter((x) => x.id !== id);
                    save();
                    if (editingId === id) resetForm();
                    renderList();
                    toast('已删除');
                    return;
                }

                const item = entries.find((x) => x.id === id);
                if (!item) return;

                if (action === 'ep-plus') {
                    item.currentEp = (item.currentEp ?? 0) + 1;
                    if (item.totalEp != null && item.currentEp > item.totalEp) item.currentEp = item.totalEp;
                    item.updatedAt = Date.now();
                    save();
                    renderList();
                    toast('进度 +1');
                    return;
                }

                if (action === 'edit') {
                    editingId = id;
                    el.formTitle.textContent = '编辑条目';
                    el.btnSubmit.textContent = '更新';
                    el.btnCancelEdit.hidden = false;
                    el.title.value = item.title;
                    el.status.value = item.status;
                    el.currentEp.value = item.currentEp != null ? item.currentEp : '';
                    el.totalEp.value = item.totalEp != null ? item.totalEp : '';
                    el.url.value = item.url || '';
                    el.title.focus();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            });

            el.filterStatus.addEventListener('change', renderList);
            el.search.addEventListener('input', () => {
                clearTimeout(el.search._t);
                el.search._t = setTimeout(renderList, 120);
            });

            el.btnExport.addEventListener('click', async () => {
                const json = JSON.stringify(entries, null, 2);
                const filename = EXPORT_FILENAME;

                if (typeof window.showSaveFilePicker === 'function') {
                    try {
                        const handle = await window.showSaveFilePicker({
                            suggestedName: filename,
                            types: [
                                {
                                    description: 'JSON',
                                    accept: { 'application/json': ['.json'] }
                                }
                            ]
                        });
                        const writable = await handle.createWritable();
                        await writable.write(json);
                        await writable.close();
                        toast('已导出');
                        return;
                    } catch (err) {
                        if (err && err.name === 'AbortError') return;
                    }
                }

                const blob = new Blob([json], { type: 'application/json' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = filename;
                a.click();
                URL.revokeObjectURL(a.href);
                toast('已导出');
            });

            async function openImportPicker() {
                if (typeof window.showOpenFilePicker === 'function') {
                    try {
                        const handles = await window.showOpenFilePicker({
                            multiple: false,
                            types: [
                                {
                                    description: 'JSON',
                                    accept: { 'application/json': ['.json'] }
                                }
                            ]
                        });
                        const file = await handles[0].getFile();
                        const text = await file.text();
                        try {
                            processImportText(text);
                        } catch (_) {
                            toast('导入失败：文件格式不对');
                        }
                        return;
                    } catch (err) {
                        if (err && err.name === 'AbortError') return;
                    }
                }
                el.importFile.click();
            }

            el.btnImport.addEventListener('click', () => {
                openImportPicker();
            });

            el.importFile.addEventListener('change', () => {
                const file = el.importFile.files?.[0];
                el.importFile.value = '';
                if (!file) return;
                const reader = new FileReader();
                reader.onload = () => {
                    try {
                        processImportText(reader.result);
                    } catch (err) {
                        toast('导入失败：文件格式不对');
                    }
                };
                reader.readAsText(file, 'UTF-8');
            });

            el.btnClear.addEventListener('click', () => {
                if (!confirm('确定清空全部记录？此操作不可撤销（可先导出备份）。')) return;
                entries = [];
                save();
                resetForm();
                renderList();
                toast('已清空');
            });

            load().then(() => renderList());
        })();
    </script>
</body>

</html>
