<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>统计</title>
    <script src="api-config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.min.js"></script>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        :root {
            --bg: #0b1220;
            --card: #111827;
            --grid: #1f2937;
            --text: #e5e7eb;
            --muted: #9ca3af;
            --pos: #22c55e;
            --neg: #ef4444;
            --accent: #3b82f6;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
            line-height: 1.45;
            -webkit-font-smoothing: antialiased;
        }

        header {
            padding: 14px 20px;
            border-bottom: 1px solid var(--grid);
            display: flex;
            justify-content: center;
            position: sticky;
            top: 0;
            background: rgba(11, 18, 32, 0.92);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .header-inner {
            width: 100%;
            max-width: 1280px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .left {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .header-summary {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: flex-end;
        }

        .header-summary .card {
            padding: 8px 12px;
            font-size: 13px;
        }

        button {
            background: #1f2937;
            border: none;
            padding: 8px 14px;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.15s, transform 0.1s;
        }

        button:hover {
            background: #374151;
        }

        button:active {
            transform: scale(0.98);
        }

        button.active {
            background: var(--accent);
        }

        button.active:hover {
            background: #2563eb;
        }

        select {
            padding: 8px 10px;
            border-radius: 8px;
            background: #111;
            color: #fff;
            border: 1px solid var(--grid);
            font-size: 14px;
            cursor: pointer;
        }

        .container {
            padding: 20px;
            max-width: 1280px;
            margin: auto;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(158px, 1fr));
            gap: 12px;
        }

        .day {
            background: var(--card);
            border-radius: 12px;
            padding: 14px 12px;
            border: 1px solid var(--grid);
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
        }

        .day:hover {
            transform: translateY(-2px);
            border-color: #374151;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
        }

        .day input {
            width: 100%;
            margin-top: 8px;
            padding: 10px 10px;
            border-radius: 8px;
            border: 1px solid var(--grid);
            background: #020617;
            color: #fff;
            font-size: 15px;
            -moz-appearance: textfield;
        }

        .day input::placeholder {
            color: #6b7280;
            opacity: 1;
        }

        .day input::-webkit-outer-spin-button,
        .day input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .day .date {
            font-size: 13px;
            color: var(--muted);
            font-weight: 500;
        }

        .day .diff {
            margin-top: 8px;
            font-size: 14px;
            font-weight: 600;
            min-height: 1.3em;
        }

        .pos {
            color: var(--pos)
        }

        .neg {
            color: var(--neg)
        }

        .year-no-data {
            color: #6b7280;
            font-weight: 500;
        }

        .summary {
            margin-top: 20px;
            font-size: 15px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .card {
            background: var(--card);
            padding: 14px 18px;
            border-radius: 12px;
            border: 1px solid var(--grid);
        }

        .hidden {
            display: none
        }

        .today {
            border: 1px solid var(--accent)
        }

        .nav-home {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 12px;
            border-radius: 8px;
            background: #1f2937;
            color: var(--text);
            text-decoration: none;
            font-size: 14px;
            border: 1px solid var(--grid);
            transition: background 0.15s, border-color 0.15s;
        }

        .nav-home:hover {
            background: #374151;
            border-color: #4b5563;
        }
    </style>
</head>

<body>
    <header>
        <div class="header-inner">
            <div class="left">
                <a class="nav-home" href="index.html" title="返回首页">← 首页</a>
                <button id="btn-month" class="active" onclick="switchView('month')">当月</button>
                <button id="btn-year" onclick="switchView('year')">总览</button>
                <select id="monthSelect" onchange="renderMonth()"></select>
                <button type="button" onclick="exportFullYearExcel()">导出 Excel</button>
                <button type="button" onclick="document.getElementById('importFile').click()">导入 Excel</button>
                <input type="file" id="importFile" class="hidden" accept=".xlsx,.xls" onchange="importFromExcel(event)">
            </div>
            <div class="header-summary" id="headerSummary"></div>
        </div>
    </header>

    <div class="container">
        <div id="monthView"></div>
        <div id="yearView" class="hidden"></div>
    </div>

    <script>
        const YEAR = new Date().getFullYear();
        const TODAY = new Date();
        const STANDARD = 480;
        const API_BASE = String(window.FORME_API_BASE || '').trim().replace(/\/$/, '');
        const API_KEY = String(window.FORME_API_KEY || '').trim();

        function apiUrl(p) {
            return API_BASE + p;
        }

        function apiHeaders(json) {
            const h = {};
            if (json) h['Content-Type'] = 'application/json';
            if (API_KEY) h['X-API-Key'] = API_KEY;
            return h;
        }

        let workSaveTimer = null;

        // 返回指定年月的天数
        function daysInMonth(y, m) {
            return new Date(y, m, 0).getDate();
        }

        // 解析字符串形，格式如 "8.30" 表示 8 小时 30 分钟，返回总分钟数
        function parse(v) {
            if (!v) return null;
            let [a, b] = v.split('.');
            return (a || 0) * 60 + (b || 0) * 1;
        }

        // 将分钟数格式化为 "XhYm" 形式
        function format(m) {
            let h = Math.floor(Math.abs(m) / 60), mm = Math.abs(m) % 60;
            return h + 'h' + mm + 'm';
        }

        // 将分钟数格式化为带符号的字符串，正数前加 "+"，负数前加 "-"，零则显示 "±0h0m"
        function formatSignedDiff(minutes) {
            if (minutes === 0) return '±0h0m';
            const sign = minutes > 0 ? '+' : '-';
            return sign + format(minutes);
        }

        // 将字符串或数字规范化为 "H.MM" 形式，小时部分和分钟部分都不带前导零，分钟部分始终两位
        function normalize(v) {
            if (!v) return '';
            let [a, b] = v.split('.');
            return `${parseInt(a || 0)}.${String(parseInt(b || 0)).padStart(2, '0')}`;
        }

        // 生成数据对象的键，格式为 "YYYY-M-D"
        function key(m, d) {
            return `${YEAR}-${m}-${d}`;
        }

        // 解析列标题，支持 "3月"、"3 月"、"M3"、"M 3" 等格式，返回月份数字，无法解析则返回 null
        function parseMonthColumnHeader(cell) {
            const s = String(cell == null ? '' : cell).trim();
            const m = s.match(/^(\d{1,2})\s*月\s*$/);
            if (m) return +m[1];
            const m2 = s.match(/^M\s*(\d{1,2})$/i);
            if (m2) return +m2[1];
            return null;
        }

        // 解析行标题，支持日期对象、Excel 日期数字、"YYYY-MM-DD" 格式字符串等，返回 { y: 年, m: 月, d: 日 }，无法解析则返回 null
        function parseRowDateParts(cell) {
            if (cell instanceof Date && !isNaN(+cell)) {
                return { y: cell.getFullYear(), m: cell.getMonth() + 1, d: cell.getDate() };
            }
            if (typeof cell === 'number' && typeof XLSX !== 'undefined' && XLSX.SSF) {
                const u = XLSX.SSF.parse_date_code(cell);
                if (u && u.y != null && u.m != null && u.d != null) {
                    return { y: u.y, m: u.m, d: u.d };
                }
            }
            if (typeof cell === 'number' && cell > 20000 && cell < 60000) {
                const ms = (cell - 25569) * 86400 * 1000;
                const d = new Date(ms);
                if (!isNaN(d)) {
                    return { y: d.getUTCFullYear(), m: d.getUTCMonth() + 1, d: d.getUTCDate() };
                }
            }
            const s = String(cell == null ? '' : cell).trim();
            const m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
            if (m) return { y: +m[1], m: +m[2], d: +m[3] };
            return null;
        }

        // 将行首“日”列解析为整数天数
        function parseDayNumber(v) {
            if (typeof v === 'number') return Math.floor(v);
            if (typeof v === 'string') return parseInt(v.trim(), 10);
            return NaN;
        }

        // 将单元格内容规范化为 "H.MM" 形式的字符串，支持数字（表示小时数）和字符串输入，无法解析则返回原字符串的修剪结果
        function cellToHoursStr(cell) {
            if (cell === '' || cell == null) return '';
            if (typeof cell === 'number' && Number.isFinite(cell)) {
                return normalize((Math.round(cell * 100) / 100).toFixed(2));
            }
            return normalize(String(cell).trim());
        }

        // 导出文件句柄持久化配置（用于“同名覆盖写入”）
        const EXPORT_IDB_NAME = 'ForMeWorkHours';
        const EXPORT_IDB_STORE = 'excelExportHandle';
        const EXPORT_IDB_VER = 1;

        // 统一检查 Excel 组件是否可用
        function ensureXlsxReady() {
            if (typeof XLSX !== 'undefined') return true;
            alert('Excel 组件未加载，请检查网络后重试。');
            return false;
        }

        // 打开 IndexedDB（不存在则初始化对象仓库）
        function idbOpenExport() {
            return new Promise((resolve, reject) => {
                const req = indexedDB.open(EXPORT_IDB_NAME, EXPORT_IDB_VER);
                req.onerror = () => reject(req.error);
                req.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(EXPORT_IDB_STORE)) {
                        db.createObjectStore(EXPORT_IDB_STORE);
                    }
                };
                req.onsuccess = () => resolve(req.result);
            });
        }

        // IndexedDB 访问模板：减少读写重复样板代码
        async function idbAccess(mode, cb) {
            const db = await idbOpenExport();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(EXPORT_IDB_STORE, mode);
                const store = tx.objectStore(EXPORT_IDB_STORE);
                let result;
                tx.onerror = () => reject(tx.error);
                tx.oncomplete = () => resolve(result);
                cb(store, (v) => { result = v; }, reject);
            });
        }

        // 保存导出句柄，后续可直接覆盖同一路径文件
        function idbPutExportHandle(key, handle) {
            return idbAccess('readwrite', (store) => {
                store.put(handle, key);
            });
        }

        // 读取之前保存的导出句柄
        function idbGetExportHandle(key) {
            return idbAccess('readonly', (store, setResult, reject) => {
                const q = store.get(key);
                q.onsuccess = () => setResult(q.result);
                q.onerror = () => reject(q.error);
            });
        }

        // 优先覆盖写入已选文件；不支持时回退浏览器下载
        async function writeWorkbookXlsxReplace(wb, defaultFileName) {
            const buf = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
            const idbKey = 'xlsx-export-' + YEAR;

            const writeToHandle = async (fileHandle) => {
                const writable = await fileHandle.createWritable();
                await writable.write(buf);
                await writable.close();
            };

            if (!window.showSaveFilePicker) {
                XLSX.writeFile(wb, defaultFileName);
                return;
            }

            let saved = null;
            try {
                saved = await idbGetExportHandle(idbKey);
            } catch (_) {}

            if (saved && typeof saved.createWritable === 'function') {
                try {
                    let ok = (await saved.queryPermission({ mode: 'readwrite' })) === 'granted';
                    if (!ok) ok = (await saved.requestPermission({ mode: 'readwrite' })) === 'granted';
                    if (ok) {
                        await writeToHandle(saved);
                        return;
                    }
                } catch (_) {}
            }

            try {
                const fileHandle = await window.showSaveFilePicker({
                    suggestedName: defaultFileName,
                    types: [
                        {
                            description: 'Excel 工作簿',
                            accept: {
                                'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet': ['.xlsx'],
                            },
                        },
                    ],
                });
                await writeToHandle(fileHandle);
                await idbPutExportHandle(idbKey, fileHandle);
            } catch (e) {
                if (e && e.name === 'AbortError') return;
                XLSX.writeFile(wb, defaultFileName);
            }
        }

        // 构造导出矩阵：1 行表头 + 31 行日期，月列不存在日期留空
        function buildExportRows() {
            const header = ['日'];
            for (let m = 1; m <= 12; m++) header.push(`${m}月`);
            const rows = [header];

            for (let d = 1; d <= 31; d++) {
                const row = [d];
                for (let m = 1; m <= 12; m++) {
                    if (d > daysInMonth(YEAR, m)) {
                        row.push('');
                    } else {
                        row.push(data[key(m, d)] || '');
                    }
                }
                rows.push(row);
            }
            return rows;
        }

        // 为导出表设置颜色区分：日列、月表头、数据区、无效日期区
        function applyExportStyles(ws) {
            const styleHeaderDay = {
                fill: { patternType: 'solid', fgColor: { rgb: 'FFBFDBFE' } },
                font: { bold: true, color: { rgb: 'FF1E3A5F' } },
                alignment: { horizontal: 'center', vertical: 'center' },
            };
            const styleHeaderMonth = {
                fill: { patternType: 'solid', fgColor: { rgb: 'FFA7F3D0' } },
                font: { bold: true, color: { rgb: 'FF14532D' } },
                alignment: { horizontal: 'center', vertical: 'center' },
            };
            const styleColDay = {
                fill: { patternType: 'solid', fgColor: { rgb: 'FFEFF6FF' } },
                font: { color: { rgb: 'FF1E40AF' } },
                alignment: { horizontal: 'center', vertical: 'center' },
            };
            const styleData = {
                fill: { patternType: 'solid', fgColor: { rgb: 'FFF8FAFC' } },
                alignment: { horizontal: 'center', vertical: 'center' },
            };
            const styleNoDay = {
                fill: { patternType: 'solid', fgColor: { rgb: 'FFF1F5F9' } },
                alignment: { horizontal: 'center', vertical: 'center' },
            };

            const range = XLSX.utils.decode_range(ws['!ref']);
            for (let R = range.s.r; R <= range.e.r; R++) {
                for (let C = range.s.c; C <= range.e.c; C++) {
                    const addr = XLSX.utils.encode_cell({ r: R, c: C });
                    const cell = ws[addr];
                    if (!cell) continue;

                    if (C === 0) {
                        cell.s = R === 0 ? styleHeaderDay : styleColDay;
                    } else if (R === 0) {
                        cell.s = styleHeaderMonth;
                    } else {
                        const dayNum = R;
                        const monthNum = C;
                        const invalid = dayNum > daysInMonth(YEAR, monthNum);
                        cell.s = invalid ? styleNoDay : styleData;
                    }
                }
            }
        }

        // 导出当年 Excel（带颜色样式 + 同名覆盖写入）
        async function exportFullYearExcel() {
            if (!ensureXlsxReady()) return;

            const ws = XLSX.utils.aoa_to_sheet(buildExportRows());
            ws['!cols'] = [{ wch: 6 }, ...Array(12).fill({ wch: 10 })];
            applyExportStyles(ws);

            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, String(YEAR));
            await writeWorkbookXlsxReplace(wb, `工时-${YEAR}-全日.xlsx`);
        }

        // 判断是否为“日 + 1月..12月”宽表导入格式
        function isWideMonthFormat(matrix) {
            const h = matrix[0];
            if (!h || h.length < 2) return false;
            if (String(h[0] || '').includes('日期')) return false;
            return parseMonthColumnHeader(h[1]) != null;
        }

        // 清空当前年份的数据，供导入整表覆盖
        function clearYearData() {
            const prefix = YEAR + '-';
            for (const k of Object.keys(data)) {
                if (k.startsWith(prefix)) delete data[k];
            }
        }

        // 标准写入：空值删键，非空写入规范化后的工时
        function setDataValue(k, raw) {
            const hs = cellToHoursStr(raw);
            if (hs === '') delete data[k];
            else data[k] = hs;
        }

        // 收集宽表中的有效月份列索引
        function collectMonthCols(header) {
            const cols = [];
            for (let c = 1; c < header.length; c++) {
                const m = parseMonthColumnHeader(header[c]);
                if (m >= 1 && m <= 12) cols.push({ c, m });
            }
            return cols;
        }

        // 导入宽表格式（首列为“日”，其余为月份列）
        function applyWideMonthImport(matrix) {
            const monthCols = collectMonthCols(matrix[0]);
            if (monthCols.length === 0) return false;

            clearYearData();

            for (let r = 1; r < matrix.length; r++) {
                const row = matrix[r];
                if (!row || row.length === 0) continue;
                const d = parseDayNumber(row[0]);
                if (!Number.isFinite(d) || d < 1 || d > 31) continue;

                for (const { c, m } of monthCols) {
                    if (d > daysInMonth(YEAR, m)) continue;
                    setDataValue(key(m, d), row[c]);
                }
            }
            save();
            return true;
        }

        // 导入长表格式（日期 + 工时，两列）
        function applyLongRowImport(matrix) {
            let startRow = 0;
            const h0 = String(matrix[0][0] || '').trim();
            if (h0 === '日期' || h0.includes('日期')) startRow = 1;

            clearYearData();

            for (let r = startRow; r < matrix.length; r++) {
                const row = matrix[r];
                if (!row || !row.length) continue;
                const parts = parseRowDateParts(row[0]);
                if (!parts || parts.y !== YEAR) continue;
                setDataValue(key(parts.m, parts.d), row[1]);
            }
            save();
        }

        // 自动识别导入格式并应用
        function applyImportMatrix(matrix) {
            if (!matrix || !matrix.length) return;
            if (isWideMonthFormat(matrix)) {
                applyWideMonthImport(matrix);
            } else {
                applyLongRowImport(matrix);
            }
        }

        // 读取用户选择的 Excel，并同步到当前年份本地数据
        function importFromExcel(ev) {
            const f = ev.target.files && ev.target.files[0];
            ev.target.value = '';
            if (!f) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    if (!ensureXlsxReady()) return;
                    const buf = new Uint8Array(e.target.result);
                    const wb = XLSX.read(buf, { type: 'array', cellDates: true });
                    const ws = wb.Sheets[wb.SheetNames[0]];
                    const matrix = XLSX.utils.sheet_to_json(ws, { header: 1, raw: true, defval: '' });
                    applyImportMatrix(matrix);
                    refreshCurrentView();
                    renderYear();
                } catch (err) {
                    alert('导入失败：' + (err && err.message ? err.message : String(err)));
                }
            };
            reader.readAsArrayBuffer(f);
        }

        // 生成月视图单天卡片 HTML
        function buildDayCardHtml(m, d) {
            const v = data[key(m, d)] || '';
            const isToday = (m === TODAY.getMonth() + 1 && d === TODAY.getDate());
            return `<div class="day ${isToday ? 'today' : ''}" id="day-${m}-${d}">
      <div class="date">${m}/${d}</div>
      <input type="text" inputmode="decimal" autocomplete="off" spellcheck="false" value="${v}" placeholder="多久？"
        oninput="onInput(this,${m},${d})"
        onblur="onBlur(this,${m},${d})">
      <div class="diff" id="diff-${d}"></div>
    </div>`;
        }

        // 生成总览单月卡片 HTML
        function buildYearCardHtml(m, total, hasData) {
            const diffClass = hasData ? 'pos' : 'year-no-data';
            const diffText = hasData ? format(total) : '—';
            return `<div class="day">
      <div class="date">${m}月</div>
      <div class="diff ${diffClass}">${diffText}</div>
    </div>`;
        }

        let data = {};

        function loadLocalWork() {
            try {
                data = JSON.parse(localStorage.getItem('work-' + YEAR) || '{}');
                if (!data || typeof data !== 'object') data = {};
            } catch {
                data = {};
            }
        }

        async function loadWorkFromServer() {
            if (!API_BASE) {
                loadLocalWork();
                return;
            }
            try {
                const r = await fetch(apiUrl('/api/work/' + YEAR), { headers: apiHeaders(false) });
                if (!r.ok) throw new Error(r.status + ' ' + r.statusText);
                const obj = await r.json();
                data = obj && typeof obj === 'object' && !Array.isArray(obj) ? obj : {};
                localStorage.setItem('work-' + YEAR, JSON.stringify(data));
            } catch (e) {
                console.error(e);
                loadLocalWork();
                alert('无法从服务器加载工时数据，已使用本地缓存');
            }
        }

        async function flushWorkSave() {
            try {
                const r = await fetch(apiUrl('/api/work/' + YEAR), {
                    method: 'PUT',
                    headers: apiHeaders(true),
                    body: JSON.stringify(data),
                });
                if (!r.ok) throw new Error(await r.text());
                localStorage.setItem('work-' + YEAR, JSON.stringify(data));
            } catch (e) {
                console.error(e);
                localStorage.setItem('work-' + YEAR, JSON.stringify(data));
                alert('保存到服务器失败（已写入本地缓存）');
            }
        }

        function save() {
            localStorage.setItem('work-' + YEAR, JSON.stringify(data));
            if (!API_BASE) return;
            clearTimeout(workSaveTimer);
            workSaveTimer = setTimeout(() => {
                flushWorkSave();
            }, 500);
        }

        // 输入时即时写入（清空则删除该日记录）
        function onInput(e, m, d) {
            let val = e.value;
            if (val) data[key(m, d)] = val;
            else delete data[key(m, d)];
            save();
        }

        // 失焦时做格式归一化并刷新汇总
        function onBlur(e, m, d) {
            e.value = normalize(e.value);
            onInput(e, m, d);
            updateSummary();
        }

        // 当前选择的月份（1-12）
        function getSelectedMonth() {
            return +document.getElementById('monthSelect').value;
        }

        // 统计某月：总差额（分钟）和是否存在录入数据
        function getMonthStats(m) {
            let days = daysInMonth(YEAR, m);
            let total = 0;
            let hasData = false;
            for (let d = 1; d <= days; d++) {
                let p = parse(data[key(m, d)]);
                if (p == null) continue;
                hasData = true;
                total += p - STANDARD;
            }
            return { days, total, hasData };
        }

        // 渲染当月视图（每天一个卡片）
        function renderMonth() {
            const m = getSelectedMonth();
            const { days } = getMonthStats(m);
            let html = '<div class="grid">';

            for (let d = 1; d <= days; d++) {
                html += buildDayCardHtml(m, d);
            }

            html += '</div>';
            document.getElementById('monthView').innerHTML = html;
            updateSummary();
        }

        // 更新“本月/可提前下班”汇总以及当月每日差额
        function updateSummary() {
            let m = getSelectedMonth();
            let { days, total } = getMonthStats(m);

            for (let d = 1; d <= days; d++) {
                let v = data[key(m, d)];
                let p = parse(v);
                let el = document.getElementById('diff-' + d);
                if (!el) continue;

                if (p == null) {
                    el.innerText = '';
                    continue;
                }

                let diff = p - STANDARD;
                el.innerText = formatSignedDiff(diff);
                el.className = 'diff ' + (diff >= 0 ? 'pos' : 'neg');
            }

            let leave = total > 0 ? `可提前下班 ${format(total)}` : `需补 ${format(total)}`;
            const head = document.getElementById('headerSummary');
            if (head) {
                head.innerHTML = `
    <div class="card">本月：${format(total)}</div>
    <div class="card">${leave}</div>
  `;
            }
        }

        // 跳转并聚焦到当月当日卡片
        function scrollToTodayCell() {
            const t = new Date();
            const el = document.getElementById(`day-${t.getMonth() + 1}-${t.getDate()}`);
            if (!el) return;
            el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            const inp = el.querySelector('input');
            if (inp) inp.focus({ preventScroll: true });
        }

        // 渲染总览视图（每月一张卡）
        function renderYear() {
            let html = '<div class="grid">';

            for (let m = 1; m <= 12; m++) {
                const { total, hasData } = getMonthStats(m);
                html += buildYearCardHtml(m, total, hasData);
            }

            html += '</div>';
            document.getElementById('yearView').innerHTML = html;
        }

        // 仅刷新当前可见视图，避免无意义的双渲染
        function refreshCurrentView() {
            const monthView = document.getElementById('monthView');
            if (monthView.classList.contains('hidden')) {
                renderYear();
            } else {
                renderMonth();
            }
        }

        // 切换按钮激活态
        function setViewButtons(v) {
            document.getElementById('btn-month').classList.toggle('active', v === 'month');
            document.getElementById('btn-year').classList.toggle('active', v === 'year');
        }

        // 切换“当月 / 总览”视图
        function switchView(v) {
            const mv = document.getElementById('monthView');
            const yv = document.getElementById('yearView');

            if (v === 'month') {
                document.getElementById('monthSelect').value = String(new Date().getMonth() + 1);
                mv.classList.remove('hidden');
                yv.classList.add('hidden');
                renderMonth();
                requestAnimationFrame(() => scrollToTodayCell());
            } else {
                mv.classList.add('hidden');
                yv.classList.remove('hidden');
                renderYear();
            }

            setViewButtons(v);
        }

        // 初始化月份下拉与首屏渲染
        function init() {
            let sel = document.getElementById('monthSelect');
            for (let m = 1; m <= 12; m++) {
                sel.innerHTML += `<option value="${m}">${m}月</option>`;
            }
            sel.value = String(new Date().getMonth() + 1);
            renderMonth();
            renderYear();
        }

        loadWorkFromServer().then(() => init());
    </script>
</body>

</html>
